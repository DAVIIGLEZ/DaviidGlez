    <style>
      .ie-panel {
        display: none;
        background: #212121;
        padding: 10px 0;
        box-shadow: 3px 3px 5px 0 rgba(0,0,0,.3);
        clear: both;
        text-align:center;
        position: relative;
        z-index: 1;
      } 
      html.ie-10 .ie-panel, html.lt-ie-10 .ie-panel {display: block;}

      /* Redes Sociales Cuadradas Animadas */
      .social-container {
        display: flex;
        justify-content: center;
        gap: 25px;
        margin: 40px 0;
        flex-wrap: wrap;
      }

      .social-btn-square {
        width: 70px;
        height: 70px;
        border-radius: 20%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        color: white;
        background: #111;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .social-btn-square::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: rgba(255,255,255,0.1);
        transform: rotate(45deg) translateX(-100%);
        transition: all 0.7s ease-in-out;
      }

      .social-btn-square:hover::before {
        transform: rotate(45deg) translateX(100%);
      }

      .social-btn-square:hover {
        transform: scale(1.3) rotate(-10deg);
        animation: neonPulse 1.2s infinite alternate;
      }

      @keyframes neonPulse {
        0% { box-shadow: 0 0 10px rgba(255,255,255,0.2), 0 0 20px rgba(255,255,255,0.1); }
        50% { box-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 40px rgba(255,255,255,0.3); }
        100% { box-shadow: 0 0 15px rgba(255,255,255,0.2), 0 0 30px rgba(255,255,255,0.15); }
      }

      /* Colores específicos con neon glow */
      .facebook { background: #1877f2; box-shadow: 0 0 10px #1877f2; }
      .instagram { background: linear-gradient(45deg, #fd1d1d, #e1306c, #833ab4, #5851db); box-shadow: 0 0 10px #e1306c; }
      .tiktok { background: #000; box-shadow: 0 0 10px #00f2ea, 0 0 10px #ff0050; }
      .youtube { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
      .apple { background: #333; box-shadow: 0 0 10px #ccc; }
      .spotify { background: #1DB954; box-shadow: 0 0 10px #1DB954; }
      .deezer { background: #ef5466; box-shadow: 0 0 10px #ef5466; }

      .social-btn-square i {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }

      /* ===============================

      /* Logo desktop y mobile */

      .logo-desktop { display: block; }

      @media (max-width: 576px) {
        .logo-desktop { display: none; }
        .logo-mobile { display: block; max-width: 80px; }

      /* ===============================
         MEDIA QUERIES RESPONSIVE
         =============================== */
      @media (max-width: 576px) {
        .rd-navbar-brand img {

        section {

        }

          width: 60px;
          height: 60px;
          font-size: 26px;
        }
      }

      @media (max-width: 992px) {

          font-size: 15px;
        }
      }
