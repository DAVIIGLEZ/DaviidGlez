    <link rel="stylesheet" href="css/bootstrap.css">

    <!-- SwiperJS CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- Lightbox2 CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet" />

    <style>
      /* Panel IE */
      .ie-panel {
        display: none;
        background: #212121;
        padding: 10px 0;
        box-shadow: 3px 3px 5px 0 rgba(0,0,0,.3);
        clear: both;
        text-align:center;
        position: relative;
        z-index: 1;
      }
      html.ie-10 .ie-panel, html.lt-ie-10 .ie-panel {display: block;}

      /* ===== Ajustes del logo ===== */
      .rd-navbar-panel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 15px;
      }

      .rd-navbar-toggle {
        margin-right: 10px;
      }

      .rd-navbar-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 5px 15px;
      }

      .rd-navbar-brand img {
        max-height: 55px;   /* tamaño en escritorio */
        height: auto;
        width: auto;
        display: block;
      }

      @media (max-width: 768px) {
        .rd-navbar-brand img {
          max-height: 45px; /* tamaño en móvil */
        }
      }

      /* ===== Carrusel principal ===== */
      .swiper {
        width: 100%;
        max-width: 1000px;
        margin: 40px auto;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      }
      .swiper-slide img {
        width: 100%;
        height: 500px;
        object-fit: cover;
        cursor: zoom-in;
      }

      /* Miniaturas */
      .swiper-thumbs {
        height: 120px;
        margin-top: 15px;
      }
      .swiper-thumbs .swiper-slide {
        opacity: 0.5;
        cursor: pointer;
      }
      .swiper-thumbs .swiper-slide-thumb-active {
        opacity: 1;
        border: 2px solid #ff0055;
      }
      .swiper-thumbs img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
      }

      /* Flechas */
      .swiper-button-next, .swiper-button-prev {
        color: #fff;
        text-shadow: 0 0 10px rgba(0,0,0,0.8);
      }

      @media (max-width: 768px) {
        .swiper-slide img {
          height: 300px;
        }
        .swiper-thumbs {
          height: 80px;
        }
      }
    </style>
  </head>
  <body>

    <!-- Lightbox2 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>

    <script>
      var swiperThumbs = new Swiper(".mySwiper", {
        spaceBetween: 10,
        slidesPerView: 4,
        freeMode: true,
        watchSlidesProgress: true,
      });

      var swiperMain = new Swiper(".mySwiper2", {
        spaceBetween: 10,
        loop: true,
        autoplay: {
          delay: 3000,
          disableOnInteraction: false,
        },
        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev",
        },
        thumbs: {
          swiper: swiperThumbs,
        },
      });
    </script>
